<header class="bg-white shadow-sm border-b-[3px] border-institucional-600 sticky top-0 z-50 relative">
  <div class="w-full px-4 sm:px-6 lg:px-10">
    <div class="flex items-center justify-between h-16">

      <div class="flex items-center gap-3 min-w-0">
        @if (institucion?.logo) {
         <img
            [src]="obtenerUrlLogo()"
            alt="Logo institucional"
            class="w-12 h-12 rounded-lg object-contain flex-shrink-0 bg-white p-0.5"
            style="image-rendering: -webkit-optimize-contrast;"
          />
        } @else {
          <div class="w-10 h-10 rounded-lg bg-institucional-600 flex items-center justify-center text-white font-semibold text-sm flex-shrink-0">
            IE
          </div>
        }
        <div class="min-w-0">
          <p class="text-sm sm:text-base font-semibold text-gray-800 truncate">
            {{ institucion?.nombre ?? 'Institucion Educativa' }}
          </p>
          @if (institucion?.direccion) {
            <p class="text-xs text-gray-500 truncate hidden sm:block">
              {{ institucion?.direccion }}
            </p>
          }
        </div>
      </div>

      <nav class="hidden md:flex items-center gap-8 flex-shrink-0">
        <a href="#inicio" class="text-sm font-medium text-gray-700 hover:text-institucional-600 transition-colors">
          Inicio
        </a>
        <a href="#noticias" class="text-sm font-medium text-gray-700 hover:text-institucional-600 transition-colors">
          Noticias
        </a>
        <a href="#nosotros" class="text-sm font-medium text-gray-700 hover:text-institucional-600 transition-colors">
          Nosotros
        </a>
        <a href="#contacto" class="text-sm font-medium text-gray-700 hover:text-institucional-600 transition-colors">
          Contacto
        </a>
        <button
          (click)="irALogin()"
          class="bg-institucional-600 text-white text-sm font-semibold px-5 py-2 rounded-lg hover:bg-institucional-700 transition-colors"
        >
          Iniciar sesion
        </button>
      </nav>

      <div class="flex items-center gap-2 md:hidden flex-shrink-0">
        <button
          (click)="irALogin()"
          class="bg-institucional-600 text-white text-xs sm:text-sm font-semibold px-3 sm:px-4 py-2 rounded-lg hover:bg-institucional-700 transition-colors"
        >
          Iniciar sesion
        </button>
        <button
          (click)="toggleMenu()"
          class="p-2 text-gray-700"
          aria-label="Abrir menu"
        >
          @if (!menuAbierto) {
            <svg xmlns="http://www.w3.org/2000/svg" class="w-6 h-6" fill="none" viewBox="0 0 24 24" stroke="currentColor">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16" />
            </svg>
          } @else {
            <svg xmlns="http://www.w3.org/2000/svg" class="w-6 h-6" fill="none" viewBox="0 0 24 24" stroke="currentColor">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12" />
            </svg>
          }
        </button>
      </div>

    </div>
  </div>

  @if (menuAbierto) {
    <nav class="md:hidden absolute top-16 left-0 right-0 bg-white shadow-lg border-t border-gray-100 flex flex-col py-2 z-40">
      <a href="#inicio" class="text-sm font-medium text-gray-700 px-6 py-3 hover:bg-gray-50">Inicio</a>
      <a href="#noticias" class="text-sm font-medium text-gray-700 px-6 py-3 hover:bg-gray-50">Noticias</a>
      <a href="#nosotros" class="text-sm font-medium text-gray-700 px-6 py-3 hover:bg-gray-50">Nosotros</a>
      <a href="#contacto" class="text-sm font-medium text-gray-700 px-6 py-3 hover:bg-gray-50">Contacto</a>
    </nav>
  }

</header>
