<footer id="contacto" class="bg-gray-900 text-white">

            </svg>
            <span>{{ institucion?.direccion }}</span>
          </div>
        }
        @if (institucion?.telefono) {
          <div class="flex items-center gap-1.5">
            <svg class="w-3.5 h-3.5 flex-shrink-0" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor">

        @if (institucion?.correo) {

            <svg class="w-3.5 h-3.5 flex-shrink-0" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor">
