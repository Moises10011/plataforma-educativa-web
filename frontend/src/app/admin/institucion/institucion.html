<div>
  <div class="mb-6">
    <h1 class="text-xl font-bold text-gray-900">Institución</h1>
    <p class="text-sm text-gray-500 mt-1">Información general del colegio</p>
  </div>

  @if (cargando()) {
    <div class="bg-white rounded-xl shadow-sm p-5 h-80 animate-pulse"></div>
  } @else {
    <div class="bg-white rounded-xl shadow-sm p-6">

      @if (guardadoOk()) {
        <div class="mb-4 bg-green-50 text-green-700 text-sm rounded-lg px-4 py-2 flex items-center gap-2">
          <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"/></svg>
          Información guardada correctamente
        </div>
      }
      @if (error()) {
        <div class="mb-4 bg-red-50 text-red-600 text-sm rounded-lg px-4 py-2">{{ error() }}</div>
      }

      <!-- Logo -->
      <div class="flex items-center gap-4 mb-6 pb-6 border-b border-gray-100">
        <div class="w-20 h-20 rounded-xl bg-gray-50 border border-gray-100 flex items-center justify-center overflow-hidden">
          @if (logoUrl()) {
            <img [src]="logoUrl()" alt="Logo" class="w-full h-full object-contain">
          } @else {
            <svg class="w-8 h-8 text-gray-300" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M4 16l4.586-4.586a2 2 0 012.828 0L16 16m-2-2l1.586-1.586a2 2 0 012.828 0L20 14m-6-6h.01M6 20h12a2 2 0 002-2V6a2 2 0 00-2-2H6a2 2 0 00-2 2v12a2 2 0 002 2z"/></svg>
          }
        </div>
        <div>
          <p class="text-sm font-medium text-gray-700 mb-1">Logo institucional</p>
          <input (change)="onLogoChange($event)" type="file" accept="image/*"
            class="text-sm file:mr-3 file:py-1 file:px-3 file:rounded-md file:border-0 file:text-xs file:font-medium file:bg-institucional-50 file:text-institucional-700 hover:file:bg-institucional-100">
        </div>
      </div>

      <div class="grid grid-cols-1 sm:grid-cols-2 gap-5">
        <div class="sm:col-span-2">
          <label class="block text-xs font-medium text-gray-600 mb-1">Nombre del colegio</label>
          <input [(ngModel)]="form.nombre" type="text"
            class="w-full border border-gray-200 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-institucional-500">
        </div>
        <div>
          <label class="block text-xs font-medium text-gray-600 mb-1">Director</label>
          <input [(ngModel)]="form.director" type="text"
            class="w-full border border-gray-200 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-institucional-500">
        </div>
        <div>
          <label class="block text-xs font-medium text-gray-600 mb-1">Teléfono</label>
          <input [(ngModel)]="form.telefono" type="text"
            class="w-full border border-gray-200 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-institucional-500">
        </div>
        <div>
          <label class="block text-xs font-medium text-gray-600 mb-1">Correo institucional</label>
          <input [(ngModel)]="form.correo" type="email"
            class="w-full border border-gray-200 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-institucional-500">
        </div>
        <div>
          <label class="block text-xs font-medium text-gray-600 mb-1">Dirección</label>
          <input [(ngModel)]="form.direccion" type="text"
            class="w-full border border-gray-200 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-institucional-500">
        </div>
        <div class="sm:col-span-2">
          <label class="block text-xs font-medium text-gray-600 mb-1">Misión</label>
          <textarea [(ngModel)]="form.mision" rows="3"
            class="w-full border border-gray-200 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-institucional-500 resize-none"></textarea>
        </div>
        <div class="sm:col-span-2">
          <label class="block text-xs font-medium text-gray-600 mb-1">Visión</label>
          <textarea [(ngModel)]="form.vision" rows="3"
            class="w-full border border-gray-200 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-institucional-500 resize-none"></textarea>
        </div>
      </div>

      <div class="mt-6 flex justify-end">
        <button (click)="guardar()" [disabled]="guardando()"
          class="bg-institucional-600 text-white text-sm font-medium px-6 py-2 rounded-lg hover:bg-institucional-700 transition-colors disabled:opacity-50">
          {{ guardando() ? 'Guardando...' : 'Guardar cambios' }}
        </button>
      </div>
    </div>
  }
</div>
